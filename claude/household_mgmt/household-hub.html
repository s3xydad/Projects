<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Household Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="household-hub.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>the household hub</h1>
    <p>chores, meals & errands — shared by everyone here</p>
  </header>

  <div class="roommates-strip" id="roommatesStrip"></div>
  <div class="roommate-toggle-row">
    <button class="roommate-toggle-btn" id="roommateToggleBtn" onclick="toggleAddRoommate()">+ manage roommates</button>
  </div>
  <div class="roommates-strip" id="addRoommateRow" style="display:none;">
    <div class="add-roommate">
      <input id="newRoommate" placeholder="add roommate" maxlength="20">
      <button onclick="addRoommate()">add</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="chores" onclick="switchTab('chores')">chores</button>
    <button class="tab" data-tab="meals" onclick="switchTab('meals')">meals</button>
    <button class="tab" data-tab="errands" onclick="switchTab('errands')">errands</button>
  </div>

  <div class="board">
    <div id="panel-chores"></div>
    <div id="panel-meals" style="display:none;"></div>
    <div id="panel-errands" style="display:none;"></div>
  </div>

  <p class="sync-note">everyone who opens this hub sees the same board — changes save automatically</p>
</div>

<script src="shared.js"></script>
<script src="household-hub.js"></script>
</body>
</html>
